<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hansi">
<meta name="theme-color" content="#1F3FAF">
<meta name="color-scheme" content="light dark">
<title>Hansi</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue-dark: #133188;
  --blue: #3857B2;
  --blue-grad-top: #3857B2;
  --blue-grad-bot: #133188;
  --cream: #ebded1;
  --cream-bg: #ede8df;
  --glass: rgba(255,255,255,0.11);
  --glass-border: rgba(255,255,255,0.16);
  --muted: rgba(235,222,209,0.75);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

html, body {
  font-family: 'Nunito', sans-serif;
  height: 100%;
  overflow: hidden;
  background: var(--blue-dark);
}

/* ── BG ── */
.bluebg {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
}

/* ════════════════════════════
   SCREEN TRANSITIONS
════════════════════════════ */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(18px);
}
.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}
.screen.slide-out {
  opacity: 0;
  transform: translateY(-18px);
  pointer-events: none;
}

/* Cards stagger in when main screen loads */
.card, .mood-card, .erledigt {
  animation: cardIn 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
}
.grid2:first-of-type .card:nth-child(1) { animation-delay: 0.05s; }
.grid2:first-of-type .card:nth-child(2) { animation-delay: 0.12s; }
.grid2:last-of-type .card:nth-child(1)  { animation-delay: 0.19s; }
.grid2:last-of-type .card:nth-child(2)  { animation-delay: 0.26s; }
.erledigt { animation-delay: 0.32s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Big number pop when +/- pressed */
.c-num.bump { animation: bigBump 0.22s cubic-bezier(0.34,1.8,0.64,1); }
@keyframes bigBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.35); }
  100% { transform: scale(1); }
}

/* Erledigt button pulse */
.erledigt { position: relative; overflow: hidden; }
.erledigt::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: rgba(255,255,255,0.3);
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.3s, transform 0.3s;
}
.erledigt:active::after { opacity: 1; transform: scale(1); }

/* Report rows slide in */
.r-row {
  animation: slideInRow 0.4s cubic-bezier(0.4,0,0.2,1) both;
}
.r-row:nth-child(1) { animation-delay: 0.1s; }
.r-row:nth-child(2) { animation-delay: 0.18s; }
.r-row:nth-child(3) { animation-delay: 0.26s; }
.r-row:nth-child(4) { animation-delay: 0.34s; }

@keyframes slideInRow {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Report header slides down */
.report-top {
  animation: slideDown 0.5s cubic-bezier(0.34,1.2,0.64,1) 0.05s both;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ════════════════════════════
   SPLASH
════════════════════════════ */
#splash { background: linear-gradient(175deg, #3857B2 0%, #133188 100%); z-index: 50; }

#splashLogoWrap {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: splashPop 0.7s cubic-bezier(0.34,1.4,0.64,1) 0.2s both;
}

@keyframes splashPop {
  from { opacity: 0; transform: scale(0.75); }
  to   { opacity: 1; transform: scale(1); }
}

#splashSVG {
  width: 210px;
  height: 67px;
  display: block;
}

/* ════════════════════════════
   ENTER NAME
════════════════════════════ */
#enter-name {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  padding: 48px 32px;
  gap: 0;
}

.name-q {
  color: var(--cream);
  font-size: 34px;
  font-weight: 900;
  text-align: center;
  line-height: 1.25;
  margin-bottom: 44px;
}

.glass-input {
  width: 100%;
  max-width: 320px;
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  border-radius: 20px;
  padding: 18px 22px;
  color: var(--cream);
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 700;
  outline: none;
  text-align: center;
  margin-bottom: 20px;
  -webkit-appearance: none;
  backdrop-filter: blur(16px);
}
.glass-input::placeholder { color: rgba(235,222,209,0.5); }
.glass-input:focus { border-color: rgba(235,222,209,0.4); }

.cream-btn {
  background: var(--cream);
  color: var(--blue-dark);
  border: none;
  border-radius: 20px;
  padding: 19px 0;
  width: 100%;
  max-width: 320px;
  font-family: 'Nunito', sans-serif;
  font-size: 19px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  transition: transform 0.1s;
}
.cream-btn:active { transform: scale(0.96); }

/* ════════════════════════════
   WELCOME
════════════════════════════ */
#welcome {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  gap: 0;
  padding: 0 32px;
}

.welcome-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.welcome-h {
  width: 44px;
  height: 44px;
  margin-bottom: 16px;
  animation: popIn 0.5s cubic-bezier(0.34,1.5,0.64,1) 0.1s both;
}

.welcome-title {
  color: var(--cream);
  font-size: 30px;
  font-weight: 900;
  text-align: center;
  line-height: 1.15;
  animation: fadeUp 0.5s ease 0.3s both;
  margin-bottom: 10px;
}

.welcome-sub {
  color: var(--muted);
  font-size: 16px;
  font-weight: 700;
  animation: fadeUp 0.5s ease 0.45s both;
  margin-bottom: 32px;
}

/* Three dots loader */
.progress-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  background: none;
  height: auto;
  overflow: visible;
  animation: fadeUp 0.5s ease 0.6s both;
}
.progress-bar::after { display: none; }
.progress-fill { display: none; }

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(235,222,209,0.35);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.22s; }
.dot:nth-child(3) { animation-delay: 0.44s; }

@keyframes dotPulse {
  0%, 80%, 100% { background: rgba(235,222,209,0.2); transform: scale(0.8); }
  40% { background: rgba(235,222,209,0.95); transform: scale(1.2); }
}
@keyframes popIn { from{opacity:0;transform:scale(0.4)} to{opacity:1;transform:scale(1)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ════════════════════════════
   MAIN
════════════════════════════ */
#main {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  justify-content: flex-start;
  padding: 0;
  align-items: stretch;
}

.main-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 60px 20px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

.main-top {
  width: 100%;
  text-align: center;
}

.main-greeting {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.main-title {
  color: var(--cream);
  font-size: 36px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 12px;
}

.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
}

.nav-btn {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  border-radius: 12px;
  width: 38px;
  height: 38px;
  color: var(--cream);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, opacity 0.2s;
  flex-shrink: 0;
}
.nav-btn:active { transform: scale(0.9); }
.nav-btn.ghost { opacity: 0; pointer-events: none; }

.main-date {
  color: var(--cream);
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  flex: 1;
}

/* Counter grid */
.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
}

.card {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  border-radius: 20px;
  padding: 18px 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 160px;
}

/* Subtle color tints per category */
.card-blue   { background: rgba(60,100,255,0.35); border-color: rgba(100,150,255,0.5); }
.card-indigo { background: rgba(100,50,255,0.35); border-color: rgba(150,100,255,0.5); }
.card-teal   { background: rgba(20,160,160,0.35); border-color: rgba(60,200,200,0.5); }
.card-violet { background: rgba(180,50,170,0.35); border-color: rgba(220,100,200,0.5); }

.card-icon { font-size: 26px; line-height: 1; margin-bottom: auto; }

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0 4px;
}

.c-num {
  font-size: 40px;
  font-weight: 900;
  color: var(--cream);
  text-align: center;
  line-height: 1;
  flex: 1;
}

.c-btn {
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  color: var(--cream);
  font-size: 18px;
  font-weight: 400;
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  transition: transform 0.1s, background 0.1s;
  line-height: 1;
  flex-shrink: 0;
}
.c-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.25); }

.c-num.bump { animation: bump 0.16s ease; }
@keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

.card-lbl {
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  margin-top: auto;
  white-space: nowrap;
}

/* mood card */
.mood-card {
  background: rgba(200,80,180,0.18);
  border: 1.5px solid rgba(220,120,200,0.25);
  border-radius: 20px;
  padding: 18px 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  min-height: 160px;
}

.mood-lbl {
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  flex-shrink: 0;
  white-space: nowrap;
}

.mood-opts {
  display: flex;
  gap: 8px;
  flex: 1;
}

.mood-opt {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 8px 4px;
  font-size: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.14s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  min-height: 44px;
}
.mood-opt:active { transform: scale(0.92); }
.mood-opt.on { background: rgba(235,222,209,0.18); border-color: rgba(235,222,209,0.45); transform: scale(1.08); }

.erledigt {
  background: var(--cream);
  color: var(--blue-dark);
  border: none;
  border-radius: 20px;
  padding: 19px;
  width: 100%;
  font-family: 'Nunito', sans-serif;
  font-size: 19px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  transition: transform 0.1s;
}
.erledigt:active { transform: scale(0.97); }

/* ════════════════════════════
   WEEK BAR
════════════════════════════ */
.week-bar {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  width: 100%;
  padding: 4px 0;
}

.week-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.week-dot-circle {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(235,222,209,0.15);
  border: 1.5px solid rgba(235,222,209,0.25);
  transition: background 0.3s;
  pointer-events: none;
  font-size: 0;
}

.week-dot-circle.done {
  background: rgba(235,222,209,0.85);
  border-color: rgba(235,222,209,0.9);
}

.week-dot-circle.today {
  border-color: var(--cream);
  border-width: 2px;
}

.week-dot-label {
  color: rgba(235,222,209,0.8);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ════════════════════════════
   ACHIEVEMENT
════════════════════════════ */
#achievement {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  z-index: 40;
}

.ach-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 32px;
  text-align: center;
  animation: achPop 0.6s cubic-bezier(0.34,1.4,0.64,1) both;
}

@keyframes achPop {
  from { opacity: 0; transform: scale(0.7) translateY(40px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.ach-emoji {
  font-size: 80px;
  line-height: 1;
  margin-bottom: 20px;
  animation: achBounce 0.8s cubic-bezier(0.34,1.6,0.64,1) 0.2s both;
}

@keyframes achBounce {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

.ach-title {
  color: var(--cream);
  font-size: 32px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 12px;
}

.ach-desc {
  color: rgba(235,222,209,0.9);
  font-size: 18px;
  font-weight: 700;
  line-height: 1.4;
}


#report {
  background: var(--cream-bg);
  justify-content: flex-start;
  padding: 0;
  align-items: stretch;
}

.report-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  width: 100%;
}

.report-top {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  padding: 60px 32px 36px;
  border-radius: 0 0 32px 32px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: slideDown 0.5s cubic-bezier(0.34,1.2,0.64,1) 0.05s both;
}

.report-tag {
  color: rgba(235,222,209,0.5);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.report-hi {
  color: var(--cream);
  font-size: 34px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 8px;
  animation: fadeUp 0.55s cubic-bezier(0.34,1.2,0.64,1) 0.2s both;
}

.report-body {
  flex: 1;
  padding: 28px 22px 48px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.report-date {
  color: var(--cream);
  font-size: 20px;
  font-weight: 800;
  text-align: center;
  animation: fadeUp 0.5s ease 0.3s both;
  background: rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 20px;
  margin-top: 10px;
  display: inline-block;
}

.report-card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(26,47,160,0.08);
  animation: fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) 0.35s both;
}

.report-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  animation: fadeUp 0.5s ease 0.55s both;
}

.report-nav {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
}
.report-nav .nav-btn {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.2);
}
.report-back-btn {
  font-size: 20px;
}

.r-row {
  display: flex;
  align-items: center;
  padding: 16px 22px;
  gap: 14px;
  animation: fadeUp 0.4s ease both;
}
.r-row + .r-row { border-top: 1px solid rgba(26,47,160,0.07); }
.r-row:nth-child(1) { animation-delay: 0.05s; }
.r-row:nth-child(2) { animation-delay: 0.12s; }
.r-row:nth-child(3) { animation-delay: 0.19s; }
.r-row:nth-child(4) { animation-delay: 0.26s; }

.r-icon { font-size: 24px; width: 30px; text-align: center; flex-shrink: 0; }
.r-label { flex: 1; color: var(--blue-dark); font-size: 16px; font-weight: 700; }
.r-val { color: var(--blue-dark); font-size: 26px; font-weight: 900; }

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,20,80,0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  transition: opacity 0.25s ease;
}
.modal-backdrop.visible {
  opacity: 1;
  pointer-events: all;
}
.modal-box {
  background: linear-gradient(175deg, #3857B2 0%, #133188 100%);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 24px;
  padding: 32px 28px;
  width: calc(100% - 48px);
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: achPop 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
}
.modal-title {
  color: var(--cream);
  font-size: 22px;
  font-weight: 900;
  text-align: center;
}
.modal-desc {
  color: var(--muted);
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
}
.modal-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.modal-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 800;
  border-radius: 16px;
  padding: 16px 0;
  cursor: pointer;
  border: none;
  transition: transform 0.1s;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn-no {
  background: var(--cream);
  color: var(--blue-dark);
}
.modal-btn-yes {
  background: rgba(255,255,255,0.12);
  color: #ff8a8a;
  border: 1.5px solid rgba(255,100,100,0.35);
}

.btn-solid {
  background: var(--blue-dark);
  color: var(--cream);
  border: none;
  border-radius: 18px;
  padding: 17px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s;
  text-align: center;
}
.btn-solid:active { transform: scale(0.96); }

.btn-soft {
  background: rgba(26,47,160,0.09);
  color: var(--blue-dark);
  border: none;
  border-radius: 18px;
  padding: 17px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s;
  text-align: center;
}
.btn-soft:active { transform: scale(0.96); }

.btn-prev {
  background: var(--blue-dark);
  color: var(--cream);
  border: none;
  border-radius: 18px;
  padding: 17px;
  width: 100%;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s;
  text-align: center;
}
.btn-prev:active { transform: scale(0.96); }
